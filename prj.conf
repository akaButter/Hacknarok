# ===== CORE =====
CONFIG_PRINTK=y
CONFIG_MAIN_STACK_SIZE=4096

# ===== NETWORK =====
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_DHCPV4=y

# ===== WIFI =====
CONFIG_WIFI=y
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_WIFI_CREDENTIALS=y
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NET_L2_WIFI_MGMT=y

# ===== HARDWARE =====
CONFIG_I2C=y
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_GPIO=y

CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y